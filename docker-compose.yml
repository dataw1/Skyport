services:
  web:
    build: .
    container_name: skyport_web
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/code

  db:
    image: postgres:17
    container_name: skyport_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      #- "./init.sql:/docker-entrypoint-initdb.d/init.sql"