<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPort - {% if akcja == 'edytuj' %}Edytuj Lot{% else %}Dodaj Nowy Lot{% endif %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/admin_panel.css">
</head>
<body class="admin-body">
    <header class="navbar">
        <div class="logo">
            <span class="icon">✈️</span> <a href="/">SkyPort</a>
        </div>
        <nav class="nav-links">
            <a href="/loty">Loty</a>
            <a href="/parking">Parking</a>
            <a href="/mapy">Mapy Terminali</a>
            <a href="/bezpieczenstwo">Informacje o Bezpieczeństwie</a>
        </nav>
        <div class="nav-actions">
            {% if user %}
                <span style="color: #1a365d; font-weight: bold; margin-right: 15px;">Witaj, {{ user.imie }}!</span>
                <a href="/admin" class="btn-yellow" style="margin-right: 10px;">⚙️ Wróć do Panelu</a>
                <a href="/wyloguj" class="btn-outline">Wyloguj</a>
            {% else %}
                <a href="/logowanie" class="btn-outline">Logowanie</a>
            {% endif %}
            <button class="lang-btn">🌐 PL</button>
            <a href="/pomoc" class="help-link">❓ Centrum Pomocy</a>
        </div>
    </header>

    <div class="admin-container">
        <main class="admin-main" style="max-width: 600px; margin: 0 auto;">
            <div class="admin-content-section" style="margin-top: 40px;">
                <h2>{% if akcja == 'edytuj' %}Edytuj Lot (ID: {{ lot.id_lotu }}){% else %}Dodaj Nowy Lot{% endif %}</h2>
                
                <form action="{% if akcja == 'edytuj' %}/admin/edytuj/{{ lot.id_lotu }}{% else %}/admin/dodaj_lot{% endif %}" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
                    
                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="font-weight: bold; color: #1a365d;">Numer Lotu</label>
                        <input type="text" name="numer_lotu" required placeholder="np. BA123" value="{{ lot.numer_lotu if lot else '' }}" style="padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px;">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="font-weight: bold; color: #1a365d;">Kierunek (Miasto / Lotnisko)</label>
                        <input type="text" name="kierunek" required placeholder="np. Londyn Heathrow" value="{{ lot.kierunek if lot else '' }}" style="padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px;">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 5px;">
                        <label style="font-weight: bold; color: #1a365d;">Planowany Czas Odjazdu</label>
                        <input type="datetime-local" name="planowo" required value="{{ lot.planowo_format if lot else '' }}" style="padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px;">
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <div style="display: flex; flex-direction: column; gap: 5px; flex: 1;">
                            <label style="font-weight: bold; color: #1a365d;">Bramka</label>
                            <input type="text" name="bramka" placeholder="np. A12" value="{{ lot.bramka if lot else '' }}" style="padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px;">
                        </div>
                        
                        <div style="display: flex; flex-direction: column; gap: 5px; flex: 1;">
                            <label style="font-weight: bold; color: #1a365d;">Status</label>
                            <select name="status_lotu" style="padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px; background: white;">
                                <option value="O czasie" {% if lot and lot.status == 'O czasie' %}selected{% endif %}>O czasie</option>
                                <option value="Opóźniony" {% if lot and lot.status == 'Opóźniony' %}selected{% endif %}>Opóźniony</option>
                                <option value="Boarding" {% if lot and lot.status == 'Boarding' %}selected{% endif %}>Boarding</option>
                                <option value="Odprawa" {% if lot and lot.status == 'Odprawa' %}selected{% endif %}>Odprawa</option>
                                <option value="Odwołany" {% if lot and lot.status == 'Odwołany' %}selected{% endif %}>Odwołany</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" style="margin-top: 15px; padding: 15px; background: #ecc94b; color: #1a365d; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; font-size: 16px;">
                        {% if akcja == 'edytuj' %}Zapisz Zmiany{% else %}Dodaj Lot do Bazy{% endif %}
                    </button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
