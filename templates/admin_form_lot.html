<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyPort - {% if akcja == 'edytuj' %}Edytuj Lot{% else %}Dodaj Nowy Lot{% endif %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="/static/admin_panel.css">
</head>
<body class="admin-body">
    <header class="navbar">
        <div class="logo">
            <span class="icon">✈️</span> <a href="/">SkyPort</a>
        </div>
        <div class="nav-actions">
            <span style="color: #1a365d; font-weight: bold; margin-right: 15px;">Witaj, {{ user.imie }}!</span>
            <a href="/admin" class="btn-yellow" style="margin-right: 10px;">⚙️ Wróć do Panelu</a>
            <a href="/wyloguj" class="btn-outline">Wyloguj</a>
        </div>
    </header>

    <div class="admin-container">
        <main class="admin-main" style="max-width: 600px; margin: 0 auto;">
            <div class="admin-content-section" style="margin-top: 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
                <h2 style="margin-bottom: 25px;">{% if akcja == 'edytuj' %}Edytuj Lot (ID: {{ lot.id_lotu }}){% else %}Dodaj Nowy Lot{% endif %}</h2>
                
                <form action="{% if akcja == 'edytuj' %}/admin/edytuj/{{ lot.id_lotu }}{% else %}/admin/dodaj_lot{% endif %}" method="POST" style="display: flex; flex-direction: column; gap: 20px;">
                    
                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-weight: bold; color: #1a365d;">Numer Lotu</label>
                        <input type="text" name="numer_lotu" required placeholder="np. BA123" value="{{ lot.numer_lotu if lot else '' }}" style="padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px;">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-weight: bold; color: #1a365d;">Kierunek (Miasto / Lotnisko)</label>
                        <input type="text" name="kierunek" required placeholder="np. Londyn Heathrow" value="{{ lot.kierunek if lot else '' }}" style="padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px;">
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="font-weight: bold; color: #1a365d;">Planowany Czas Odjazdu</label>
                        <input type="datetime-local" name="planowo" required value="{{ lot.planowo_format if lot else '' }}" style="padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px;">
                    </div>

                    <div style="display: flex; gap: 20px;">
                        <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                            <label style="font-weight: bold; color: #1a365d;">Bramka</label>
                            <select name="bramka" style="padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; background: white; cursor: pointer;">
                                <option value="">Brak (Do ustalenia)</option>
                                <optgroup label="Sektor A">
                                    <option value="A1" {% if lot and lot.bramka == 'A1' %}selected{% endif %}>A1</option>
                                    <option value="A2" {% if lot and lot.bramka == 'A2' %}selected{% endif %}>A2</option>
                                    <option value="A3" {% if lot and lot.bramka == 'A3' %}selected{% endif %}>A3</option>
                                </optgroup>
                                <optgroup label="Sektor B">
                                    <option value="B1" {% if lot and lot.bramka == 'B1' %}selected{% endif %}>B1</option>
                                    <option value="B2" {% if lot and lot.bramka == 'B2' %}selected{% endif %}>B2</option>
                                </optgroup>
                                <optgroup label="Sektor C">
                                    <option value="C1" {% if lot and lot.bramka == 'C1' %}selected{% endif %}>C1</option>
                                </optgroup>
                            </select>
                        </div>
                        
                        <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
                            <label style="font-weight: bold; color: #1a365d;">Status</label>
                            <select name="status_lotu" style="padding: 12px; border: 1px solid #cbd5e0; border-radius: 6px; background: white; cursor: pointer;">
                                <option value="O czasie" {% if lot and lot.status == 'O czasie' %}selected{% endif %}>O czasie</option>
                                <option value="Opóźniony" {% if lot and lot.status == 'Opóźniony' %}selected{% endif %}>Opóźniony</option>
                                <option value="Boarding" {% if lot and lot.status == 'Boarding' %}selected{% endif %}>Boarding</option>
                                <option value="Odprawa" {% if lot and lot.status == 'Odprawa' %}selected{% endif %}>Odprawa</option>
                                <option value="Odwołany" {% if lot and lot.status == 'Odwołany' %}selected{% endif %}>Odwołany</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-yellow" style="margin-top: 10px; padding: 16px; font-size: 18px; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        {% if akcja == 'edytuj' %}Zapisz Zmiany w Locie{% else %}Dodaj Lot do Bazy{% endif %}
                    </button>
                </form>
            </div>
        </main>
    </div>
</body>
</html>
